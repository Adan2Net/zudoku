name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Prepare output for GitHub Pages
        run: |
          # Zudoku genera foo.html por ruta; GitHub Pages no sirve /foo desde foo.html
          # en subdirectorios, así que lo convertimos a foo/index.html
          find docs/dist/zudoku -name "*.html" ! -name "index.html" | while IFS= read -r f; do
            dir="${f%.html}"
            mkdir -p "$dir"
            mv "$f" "$dir/index.html"
          done
          # El index.html que genera Zudoku para "/" es un redirect fino
          # (window.location.href=...). Lo reemplazamos con la página real de
          # introducción para que /zudoku/ tenga contenido y sirva como SPA shell.
          if [ -f docs/dist/zudoku/introduction/index.html ]; then
            cp docs/dist/zudoku/introduction/index.html docs/dist/zudoku/index.html
            # 404.html para rutas SPA sin pre-render (p.ej. /v1/operations/...)
            cp docs/dist/zudoku/introduction/index.html docs/dist/404.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
