openapi: 3.1.0
info:
  title: Zudoku API V1
  version: 1.0.0
  description: >
    API principal de Zudoku para gestionar proyectos de documentación,
    colecciones y bundles de especificaciones OpenAPI.
servers:
  - url: /v1
    description: Entorno de ejemplo V1
paths:
  /v1/projects:
    $ref: paths/v1_projects.yaml
  /v1/projects/{id}:
    $ref: paths/v1_projects_{id}.yaml
  /v1/projects/{project_id}/bundles:
    $ref: paths/v1_projects_{project_id}_bundles.yaml
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Token de acceso de ejemplo para autenticar contra la API V1.
  schemas:
    Project:
      $ref: components/schemas.yaml#/Project
    ProjectInput:
      $ref: components/schemas.yaml#/ProjectInput
    Bundle:
      $ref: components/schemas.yaml#/Bundle
    BundleInput:
      $ref: components/schemas.yaml#/BundleInput
